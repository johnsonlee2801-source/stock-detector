name: 每日美港股扫描

on:
  schedule:
    # 港股收盘后：每天 10:30 UTC = 18:30 HKT
    - cron: '30 10 * * 1-5'
    # 美股收盘后：每天 00:30 UTC = 次日 08:30 HKT（周二至周六跑，覆盖周一至周五美股）
    - cron: '30 0 * * 2-6'

  # 允许手动在 GitHub 网页上点按钮触发
  workflow_dispatch:

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许写回 repo（更新 report.html）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行扫描
        run: python detector.py --no-browser
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}

      - name: 提交并推送报告
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html history.json
          # 只有文件有变化时才提交
          git diff --staged --quiet || \
            git commit -m "📊 自动更新报告 $(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M HKT')"
          git push
